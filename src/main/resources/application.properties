spring.application.name=JobportalAI

server.port=8085

spring.datasource.url=jdbc:postgresql://localhost:5432/jobportaldb
spring.datasource.username=YOUR_LOCAL_DB_USERNAME
spring.datasource.password=YOUR_LOCAL_DB_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

openrouter.api.key=YOUR_OPENROUTER_KEY